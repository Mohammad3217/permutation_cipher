<!doctype html>
<html lang="fa" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>رمزنگاری جایگشتی | Permutation Cipher</title>
    <link rel="stylesheet" href="/output.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="shortcut icon" href="favicon.png" type="image/png" />
    <style>
      * {
        font-family: "Vazirmatn", system-ui, sans-serif;
      }
      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(-10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      .toast {
        animation: fadeIn 0.3s ease-out;
      }
      .result-card {
        transition: all 0.3s ease;
      }
      .result-card:hover {
        transform: translateY(-2px);
        box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
      }
      button:disabled {
        opacity: 0.5;
        cursor: not-allowed;
        transform: none !important;
      }
      .tab-content {
        transition: opacity 0.2s ease-in-out;
      }
      .tab-content.hidden {
        display: none;
      }
      .word-break-all {
        word-break: break-all;
      }
      .input-error {
        border-color: #ef4444 !important;
        background-color: #fef2f2 !important;
      }
      .error-message {
        color: #ef4444;
        font-size: 0.75rem;
        margin-top: 0.25rem;
      }
    </style>
  </head>
  <body class="bg-linear-to-br from-blue-50 to-indigo-100 min-h-screen">
    <div class="container mx-auto px-4 py-8 max-w-6xl">
      <!-- Header -->
      <div class="text-center mb-12">
        <h1 class="text-4xl font-bold text-gray-800 mb-2">
          🔐 رمزنگاری جایگشتی
        </h1>
        <div class="flex justify-evenly flex-col md:flex-row gap-2 mt-4">
          <p class="text-gray-600">
            رمزنگاری و رمزگشایی متن با استفاده از روش جایگشت بلوکی
          </p>
          <p class="text-gray-500 text-sm">
            محمد زرقی | پروژه مبانی رایانش امن | استاد عاشوری
          </p>
        </div>
      </div>
      <!-- Main Content -->
      <div class="grid md:grid-cols-2 gap-8 mt-0">
        <div>
          <!-- Tabs Header -->
          <div class="flex justify-center gap-3 mb-0">
            <button
              id="tabEncryptBtn"
              class="tab-btn px-6 py-3 text-base font-medium rounded-t-lg transition-all duration-200 bg-green-600 text-white shadow-md"
            >
              🔒 رمزنگاری
            </button>
            <button
              id="tabDecryptBtn"
              class="tab-btn px-6 py-3 text-base font-medium rounded-t-lg transition-all duration-200 text-gray-600 bg-white hover:bg-gray-100"
            >
              🔓 رمزگشایی
            </button>
          </div>

          <!-- Encrypt Section -->
          <div
            id="encryptContent"
            class="bg-white rounded-b-2xl rounded-l-2xl shadow-xl p-6 tab-content"
          >
            <div class="flex items-center justify-between mb-6">
              <h2 class="text-2xl font-bold text-green-600">🔒 رمزنگاری</h2>
              <div
                class="bg-green-100 px-3 py-1 rounded-full text-sm text-green-700"
              >
                Encrypt
              </div>
            </div>

            <form id="encryptForm">
              <div class="mb-4">
                <label class="block text-gray-700 font-semibold mb-2"
                  >متن اصلی:</label
                >
                <textarea
                  id="encryptText"
                  rows="4"
                  class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500"
                  placeholder="متن خود را وارد کنید..."
                ></textarea>
                <div id="encryptTextError" class="error-message hidden"></div>
              </div>

              <div class="mb-4">
                <label class="block text-gray-700 font-semibold mb-2"
                  >کلمه کلید (انگلیسی):</label
                >
                <input
                  type="text"
                  id="encryptKeyword"
                  class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500"
                  placeholder="مثال: CIPHER یا SECRET"
                  dir="ltr"
                />
                <div
                  id="encryptKeywordError"
                  class="error-message hidden"
                ></div>
                <p class="text-sm text-gray-500 mt-1">
                  فقط حروف انگلیسی، حداقل ۲ و حداکثر ۲۶ حرف
                </p>
              </div>

              <button
                type="submit"
                id="encryptBtn"
                class="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-3 rounded-lg transition duration-300 transform hover:scale-105"
              >
                رمزنگاری 🚀
              </button>
            </form>
          </div>

          <!-- Decrypt Section -->
          <div
            id="decryptContent"
            class="bg-white rounded-b-2xl rounded-r-2xl shadow-xl p-6 tab-content hidden"
          >
            <div class="flex items-center justify-between mb-6">
              <h2 class="text-2xl font-bold text-blue-600">🔓 رمزگشایی</h2>
              <div
                class="bg-blue-100 px-3 py-1 rounded-full text-sm text-blue-700"
              >
                Decrypt
              </div>
            </div>

            <form id="decryptForm">
              <div class="mb-4">
                <label class="block text-gray-700 font-semibold mb-2"
                  >متن رمز شده:</label
                >
                <textarea
                  id="decryptText"
                  rows="4"
                  class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
                  placeholder="متن رمز شده را وارد کنید..."
                ></textarea>
                <div id="decryptTextError" class="error-message hidden"></div>
              </div>

              <div class="mb-4">
                <label class="block text-gray-700 font-semibold mb-2"
                  >کلمه کلید (انگلیسی):</label
                >
                <input
                  type="text"
                  id="decryptKeyword"
                  class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
                  placeholder="مثال: CIPHER یا SECRET"
                  dir="ltr"
                />
                <div
                  id="decryptKeywordError"
                  class="error-message hidden"
                ></div>
                <p class="text-sm text-gray-500 mt-1">
                  از همان کلیدی استفاده کنید که برای رمزنگاری بکار رفته
                </p>
              </div>

              <button
                type="submit"
                id="decryptBtn"
                class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-lg transition duration-300 transform hover:scale-105"
              >
                رمزگشایی 🔑
              </button>
            </form>
          </div>
        </div>
        <!-- Result Section -->
        <div class="my-12">
          <div
            id="resultSection"
            class="bg-linear-to-r from-purple-50 to-blue-50 rounded-2xl shadow-lg p-6 result-card"
          >
            <div class="flex justify-between items-start mb-4">
              <h3 class="text-xl font-bold text-purple-800">📋 نتیجه:</h3>
              <button
                id="copyButton"
                class="bg-purple-600 hover:bg-purple-700 text-white px-4 py-2 rounded-lg transition text-sm"
              >
                کپی 📋
              </button>
            </div>
            <div
              id="resultContent"
              class="bg-white rounded-lg p-4 font-mono text-gray-800 word-break-all max-h-60 overflow-y-auto"
            ></div>
            <div
              id="keyInfo"
              class="mt-4 text-sm text-gray-600 border-t pt-4 hidden"
            ></div>
          </div>
        </div>
      </div>
    </div>

    <!-- Toast Container -->
    <div
      id="toastContainer"
      class="fixed top-4 left-4 right-4 z-50 flex flex-col items-end space-y-2"
    ></div>

    <script>
      // ==========================================
      // تنظیمات اولیه
      // ==========================================
      const API_BASE = window.location.origin + "/api";
      let currentResult = "";

      // ==========================================
      // توابع کمکی
      // ==========================================
      function showToast(message, type = "success") {
        const container = document.getElementById("toastContainer");
        if (!container) return;

        const toast = document.createElement("div");
        toast.className = `toast ${type === "success" ? "bg-green-500" : "bg-red-500"} text-white px-6 py-3 rounded-lg shadow-lg flex items-center gap-2 mb-2`;
        toast.innerHTML = `
                <span class="font-semibold">${type === "success" ? "✓" : "⚠️"}</span>
                <span>${message}</span>
            `;
        container.appendChild(toast);

        setTimeout(() => {
          toast.style.opacity = "0";
          setTimeout(() => toast.remove(), 300);
        }, 3000);
      }

      // تابع لودینگ دکمه
      function setButtonLoading(button, isLoading) {
        if (!button) return;

        if (isLoading) {
          button.disabled = true;
          const originalText = button.textContent;
          button.setAttribute("data-original-text", originalText);
          button.textContent = "در حال پردازش... ⏳";
        } else {
          button.disabled = false;
          const originalText = button.getAttribute("data-original-text");
          if (originalText) {
            button.textContent = originalText;
          }
        }
      }

      // پاک کردن خطاهای فرم
      function clearFormErrors(formId) {
        const form = document.getElementById(formId);
        if (!form) return;

        const inputs = form.querySelectorAll("input, textarea");
        inputs.forEach((input) => {
          input.classList.remove("input-error");
        });

        const errorDivs = form.querySelectorAll(".error-message");
        errorDivs.forEach((div) => {
          div.classList.add("hidden");
          div.textContent = "";
        });
      }

      // نمایش خطای فیلد خاص
      function showFieldError(fieldId, errorMessage, errorDivId) {
        const field = document.getElementById(fieldId);
        const errorDiv = document.getElementById(errorDivId);

        if (field) {
          field.classList.add("input-error");
        }
        if (errorDiv) {
          errorDiv.textContent = errorMessage;
          errorDiv.classList.remove("hidden");
        }
      }

      // اعتبارسنجی کلمه کلید
      function validateKeyword(keyword) {
        if (!keyword || keyword.trim().length === 0) {
          return { valid: false, message: "کلمه کلید نمی‌تواند خالی باشد" };
        }
        if (keyword.length < 2) {
          return { valid: false, message: "کلمه کلید باید حداقل ۲ حرف باشد" };
        }
        if (keyword.length > 26) {
          return {
            valid: false,
            message: "کلمه کلید نباید بیشتر از ۲۶ حرف باشد",
          };
        }
        if (!/^[A-Za-z]+$/.test(keyword)) {
          return {
            valid: false,
            message: "کلمه کلید باید فقط شامل حروف انگلیسی باشد (A-Z)",
          };
        }
        return { valid: true };
      }

      // اعتبارسنجی متن
      function validateText(text) {
        if (!text || text.trim().length === 0) {
          return { valid: false, message: "متن نمی‌تواند خالی باشد" };
        }
        if (text.length > 1000) {
          return {
            valid: false,
            message: "متن نمی‌تواند بیشتر از ۱۰۰۰ کاراکتر باشد",
          };
        }
        return { valid: true };
      }

      // اعتبارسنجی کامل فرم رمزنگاری
      function validateEncryptForm(text, keyword) {
        let isValid = true;
        clearFormErrors("encryptForm");

        const textValidation = validateText(text);
        if (!textValidation.valid) {
          showFieldError(
            "encryptText",
            textValidation.message,
            "encryptTextError",
          );
          isValid = false;
        }

        const keywordValidation = validateKeyword(keyword);
        if (!keywordValidation.valid) {
          showFieldError(
            "encryptKeyword",
            keywordValidation.message,
            "encryptKeywordError",
          );
          isValid = false;
        }

        return isValid;
      }

      // اعتبارسنجی کامل فرم رمزگشایی
      function validateDecryptForm(text, keyword) {
        let isValid = true;
        clearFormErrors("decryptForm");

        const textValidation = validateText(text);
        if (!textValidation.valid) {
          showFieldError(
            "decryptText",
            textValidation.message,
            "decryptTextError",
          );
          isValid = false;
        }

        const keywordValidation = validateKeyword(keyword);
        if (!keywordValidation.valid) {
          showFieldError(
            "decryptKeyword",
            keywordValidation.message,
            "decryptKeywordError",
          );
          isValid = false;
        }

        return isValid;
      }

      function showResult(result, keyInfo = null) {
        const resultSection = document.getElementById("resultSection");
        const resultContent = document.getElementById("resultContent");
        const keyInfoDiv = document.getElementById("keyInfo");

        resultContent.textContent = result;
        currentResult = result;

        if (keyInfo) {
          keyInfoDiv.innerHTML = keyInfo;
          keyInfoDiv.classList.remove("hidden");
        } else {
          keyInfoDiv.classList.add("hidden");
        }

        resultSection.classList.remove("hidden");
        resultSection.scrollIntoView({ behavior: "smooth", block: "nearest" });
      }

      // ==========================================
      // تابع رمزنگاری
      // ==========================================
      async function handleEncrypt(text, keyword) {
        const response = await fetch(`${API_BASE}/encrypt`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ text, keyword: keyword.toUpperCase() }),
        });

        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.message || data.error || "خطا در رمزنگاری");
        }

        return data;
      }

      // ==========================================
      // تابع رمزگشایی
      // ==========================================
      async function handleDecrypt(text, keyword) {
        const response = await fetch(`${API_BASE}/decrypt`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ text, keyword: keyword.toUpperCase() }),
        });

        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.message || data.error || "خطا در رمزگشایی");
        }

        return data;
      }

      // ==========================================
      // Event Listeners
      // ==========================================

      // رمزنگاری
      const encryptForm = document.getElementById("encryptForm");
      const encryptBtn = document.getElementById("encryptBtn");

      encryptForm?.addEventListener("submit", async (e) => {
        e.preventDefault();

        const text = document.getElementById("encryptText").value;
        const keyword = document.getElementById("encryptKeyword").value.trim();

        // اعتبارسنجی فرم
        if (!validateEncryptForm(text, keyword)) {
          return;
        }

        // فعال کردن لودینگ
        setButtonLoading(encryptBtn, true);

        try {
          const data = await handleEncrypt(text, keyword);
          const keyInfo = `
                    <strong>🔑 اطلاعات رمزنگاری:</strong><br>
                    کلمه کلید: "${data.keyword || keyword.toUpperCase()}"<br>
                    کلید عددی: <span dir="ltr">[${data.key.join(", ")}]</span><br>
                    طول بلوک: ${data.key.length}
                `;
          showResult(data.result, keyInfo);
          showToast("✅ " + data.message, "success");

          // پاک کردن فرم بعد از موفقیت (اختیاری)
          // document.getElementById('encryptText').value = '';
          // document.getElementById('encryptKeyword').value = '';
        } catch (error) {
          showToast(`❌ ${error.message}`, "error");
        } finally {
          // غیرفعال کردن لودینگ
          setButtonLoading(encryptBtn, false);
        }
      });

      // رمزگشایی
      const decryptForm = document.getElementById("decryptForm");
      const decryptBtn = document.getElementById("decryptBtn");

      decryptForm?.addEventListener("submit", async (e) => {
        e.preventDefault();

        const text = document.getElementById("decryptText").value;
        const keyword = document.getElementById("decryptKeyword").value.trim();

        // اعتبارسنجی فرم
        if (!validateDecryptForm(text, keyword)) {
          return;
        }

        // فعال کردن لودینگ
        setButtonLoading(decryptBtn, true);

        try {
          const data = await handleDecrypt(text, keyword);
          const keyInfo = `
                    <strong>🔑 اطلاعات رمزگشایی:</strong><br>
                    کلمه کلید: "${data.keyword || keyword.toUpperCase()}"<br>
                    کلید عددی: [${data.key.join(", ")}]<br>
                    طول بلوک: ${data.key.length}
                `;
          showResult(data.result, keyInfo);
          showToast("✅ " + data.message, "success");
        } catch (error) {
          showToast(`❌ ${error.message}`, "error");
        } finally {
          // غیرفعال کردن لودینگ
          setButtonLoading(decryptBtn, false);
        }
      });

      // کپی متن
      document
        .getElementById("copyButton")
        ?.addEventListener("click", async () => {
          if (!currentResult) {
            showToast("❌ متنی برای کپی وجود ندارد", "error");
            return;
          }

          try {
            await navigator.clipboard.writeText(currentResult);
            showToast("📋 متن در کلیپ‌بورد کپی شد!", "success");
          } catch (err) {
            const textarea = document.createElement("textarea");
            textarea.value = currentResult;
            document.body.appendChild(textarea);
            textarea.select();
            document.execCommand("copy");
            document.body.removeChild(textarea);
            showToast("📋 متن در کلیپ‌بورد کپی شد!", "success");
          }
        });

      // پاک کردن خطاها هنگام تایپ
      document.getElementById("encryptText")?.addEventListener("input", () => {
        document.getElementById("encryptText")?.classList.remove("input-error");
        document.getElementById("encryptTextError")?.classList.add("hidden");
      });

      document
        .getElementById("encryptKeyword")
        ?.addEventListener("input", () => {
          document
            .getElementById("encryptKeyword")
            ?.classList.remove("input-error");
          document
            .getElementById("encryptKeywordError")
            ?.classList.add("hidden");
        });

      document.getElementById("decryptText")?.addEventListener("input", () => {
        document.getElementById("decryptText")?.classList.remove("input-error");
        document.getElementById("decryptTextError")?.classList.add("hidden");
      });

      document
        .getElementById("decryptKeyword")
        ?.addEventListener("input", () => {
          document
            .getElementById("decryptKeyword")
            ?.classList.remove("input-error");
          document
            .getElementById("decryptKeywordError")
            ?.classList.add("hidden");
        });

      // ==========================================
      // مدیریت تب‌ها
      // ==========================================
      const tabEncryptBtn = document.getElementById("tabEncryptBtn");
      const tabDecryptBtn = document.getElementById("tabDecryptBtn");
      const encryptContent = document.getElementById("encryptContent");
      const decryptContent = document.getElementById("decryptContent");

      function switchTab(tabName) {
        if (tabName === "encrypt") {
          encryptContent.classList.remove("hidden");
          decryptContent.classList.add("hidden");
          tabEncryptBtn.className =
            "tab-btn px-6 py-3 text-base font-medium rounded-t-lg transition-all duration-200 bg-green-600 text-white shadow-md";
          tabDecryptBtn.className =
            "tab-btn px-6 py-3 text-base font-medium rounded-t-lg transition-all duration-200 text-gray-600 bg-white hover:bg-gray-100";
        } else {
          encryptContent.classList.add("hidden");
          decryptContent.classList.remove("hidden");
          tabDecryptBtn.className =
            "tab-btn px-6 py-3 text-base font-medium rounded-t-lg transition-all duration-200 bg-blue-600 text-white shadow-md";
          tabEncryptBtn.className =
            "tab-btn px-6 py-3 text-base font-medium rounded-t-lg transition-all duration-200 text-gray-600 bg-white hover:bg-gray-100";
        }
      }

      tabEncryptBtn?.addEventListener("click", () => switchTab("encrypt"));
      tabDecryptBtn?.addEventListener("click", () => switchTab("decrypt"));
    </script>
  </body>
</html>
